<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — app.retorno.cl</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual-content">
        <div class="auth-visual-badge">✨ Registro gratuito</div>
        <h2>Únete a la red de transporte pesado</h2>
        <p>Regístrate como cliente o transportista y comienza a gestionar traslados de forma profesional.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-card" style="max-width:480px;">
        <div class="auth-logo">
          <h1>Crear cuenta</h1>
          <p>app.retorno.cl</p>
        </div>

        <div id="alert"></div>

        <form id="register-form">
          <div class="role-selector">
            <div class="role-option">
              <input type="radio" name="rol" id="rol-cliente" value="cliente">
              <label for="rol-cliente">
                <strong>🏗️ Cliente</strong>
                <span>Necesito mover maquinaria</span>
              </label>
            </div>
            <div class="role-option">
              <input type="radio" name="rol" id="rol-transportista" value="transportista">
              <label for="rol-transportista">
                <strong>🚛 Transportista</strong>
                <span>Tengo camión pesado</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="nombre">Nombre completo *</label>
            <input type="text" id="nombre" name="nombre" required>
          </div>
          <div class="form-group">
            <label for="email">Correo electrónico *</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+56 9 ...">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="empresa">Empresa</label>
              <input type="text" id="empresa" name="empresa">
            </div>
            <div class="form-group">
              <label for="rut">RUT</label>
              <input type="text" id="rut" name="rut" placeholder="12.345.678-9">
            </div>
          </div>
          <div class="form-group">
            <label for="password">Contraseña *</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
          </div>

          <button type="submit" class="btn btn-primary">Crear cuenta</button>
        </form>

        <div class="auth-footer">
          ¿Ya tienes cuenta? <a href="index.html">Ingresar</a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/paths.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
