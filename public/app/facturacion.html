<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facturación — Retorno Maquinaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar"></aside>
    <main class="app-main" id="facturacion-page">
      <div class="app-header">
        <div class="app-header-text">
          <h1>Facturación</h1>
          <p>Facturas emitidas por traslados completados</p>
        </div>
      </div>
      <p class="page-intro">Facturas emitidas al completar traslados confirmados.</p>
      <div class="table-card">
        <table>
          <thead>
            <tr><th>N° Factura</th><th>Solicitud</th><th>Ruta</th><th>Monto</th><th>Fecha</th><th></th></tr>
          </thead>
          <tbody id="facturas-body"></tbody>
        </table>
        <div class="empty-state" id="empty-facturas" style="display:none;"><p>Sin facturas emitidas</p></div>
      </div>
      <div id="factura-detalle" style="margin-top:1.5rem;"></div>
    </main>
  </div>
  <script src="js/paths.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
