<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos — Retorno Maquinaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar"></aside>
    <main class="app-main" id="pagos-page">
      <div class="app-header">
        <div class="app-header-text">
          <h1>Pagos</h1>
          <p>Historial de pagos y estados de retención</p>
        </div>
      </div>
      <p class="page-intro">El cliente paga antes del traslado. Retorno retiene el dinero hasta confirmar la entrega.</p>
      <div class="table-card">
        <table>
          <thead>
            <tr><th>Solicitud</th><th>Ruta</th><th>Monto</th><th>Estado pago</th><th>Solicitud</th><th></th></tr>
          </thead>
          <tbody id="pagos-body"></tbody>
        </table>
        <div class="empty-state" id="empty-pagos" style="display:none;"><p>Sin pagos registrados</p></div>
      </div>
    </main>
  </div>
  <script src="js/paths.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
