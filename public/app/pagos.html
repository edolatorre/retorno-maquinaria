<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos — Retorno Maquinaria</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-layout">
    <aside class="app-sidebar">
      <a href="/" class="app-logo"><div class="app-logo-icon">🚜</div> Retorno</a>
      <nav class="app-nav">
        <a href="dashboard.html" data-page="dashboard">📊 Solicitudes</a>
        <a href="nueva-solicitud.html" class="cliente-only" data-page="nueva-solicitud">➕ Nueva solicitud</a>
        <a href="pagos.html" data-page="pagos">💳 Pagos</a>
        <a href="facturacion.html" data-page="facturacion">🧾 Facturación</a>
      </nav>
      <div class="app-user">
        <div class="app-user-name" id="user-name">—</div>
        <div class="app-user-role" id="user-role">—</div>
        <a href="#" id="logout-btn">Cerrar sesión</a>
      </div>
    </aside>
    <main class="app-main" id="pagos-page">
      <div class="app-header"><h1>Pagos</h1></div>
      <p style="color:var(--muted);margin-bottom:1.5rem;">El cliente paga antes del traslado. Retorno retiene el dinero hasta confirmar la entrega.</p>
      <div class="table-card">
        <table>
          <thead>
            <tr><th>Solicitud</th><th>Ruta</th><th>Monto</th><th>Estado pago</th><th>Solicitud</th><th></th></tr>
          </thead>
          <tbody id="pagos-body"></tbody>
        </table>
        <div class="empty-state" id="empty-pagos" style="display:none;"><p>Sin pagos registrados</p></div>
      </div>
    </main>
  </div>
  <script src="js/paths.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
